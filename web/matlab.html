<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meshova 材质实验室</title>
<style>
  :root{
    --bg:#f2f4f7; --panel:#ffffff; --line:#d9dee7; --text:#1f2937;
    --muted:#6b7280; --accent:#2499e8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden;}
  #app{display:flex;height:100%;}
  /* 浅色展台：贴近主查看器，避免材质预览沉进黑底。 */
  #stage{flex:1;position:relative;min-width:0;
    background:linear-gradient(180deg,#b9c4cf 0%,#aab5c1 100%);}
  #canvas{width:100%;height:100%;display:block;background:transparent;}
  #loading{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
    color:#f4fbff;background:rgba(16,24,34,.58);backdrop-filter:blur(14px) brightness(.58) saturate(.82);
    opacity:0;visibility:hidden;transition:opacity .16s ease,visibility .16s ease;}
  #loading.show{opacity:1;visibility:visible;}
  .loading-copy{width:min(360px,72vw);padding:18px 20px 20px;border:1px solid rgba(142,220,255,.34);
    border-radius:6px;background:rgba(17,28,40,.88);box-shadow:0 16px 48px rgba(0,0,0,.34);}
  .loading-title{font-size:16px;font-weight:700;}
  .loading-detail{min-height:18px;margin-top:3px;color:#d9f4ff;font-size:12px;}
  .loading-track{height:7px;margin-top:16px;border-radius:999px;overflow:hidden;background:#24313dcc;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);}
  .loading-fill{height:100%;width:58%;border-radius:inherit;
    background:linear-gradient(90deg,#2ea9ff,#82e6ff,#ffffff);box-shadow:0 0 18px #67ddffaa;
    animation:loading-slide 1.05s ease-in-out infinite;}
  @keyframes loading-slide{0%{transform:translateX(-115%);}100%{transform:translateX(235%);}}
  @media (prefers-reduced-motion:reduce){.loading-fill{animation:none;width:68%;background:#ffffffd9;}}
  #hud{position:absolute;top:12px;left:12px;font-size:12px;color:var(--muted);
    background:rgba(255,255,255,.72);border:1px solid var(--line);
    padding:6px 10px;border-radius:6px;pointer-events:none;}
  #side{width:280px;background:var(--panel);border-left:1px solid var(--line);
    padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:18px;}
  h1{font-size:15px;margin:0 0 4px;font-weight:600;}
  .sub{font-size:12px;color:var(--muted);margin:0 0 8px;}
  .group{display:flex;flex-direction:column;gap:8px;}
  .glabel{font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--muted);margin-bottom:2px;}
  .row{display:flex;flex-wrap:wrap;gap:6px;}
  button.chip{background:#f5f7fb;border:1px solid var(--line);color:var(--text);
    padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;}
  button.chip:hover{border-color:var(--accent);}
  button.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  select{width:100%;background:#f5f7fb;border:1px solid var(--line);color:var(--text);
    padding:7px 8px;border-radius:6px;font-size:13px;}
  label.field{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted);}
  label.field input{accent-color:var(--accent);}
  .val{color:var(--text);font-variant-numeric:tabular-nums;}
  .foot{font-size:11px;color:var(--muted);line-height:1.5;border-top:1px solid var(--line);padding-top:10px;}
  @media (max-width:640px){
    #app{flex-direction:column;}
    #stage{flex:0 0 46%;width:100%;}
    #side{width:100%;flex:1;border-left:0;border-top:1px solid var(--line);padding:12px;gap:12px;}
    #hud{top:8px;left:8px;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="canvas"></canvas>
    <div id="hud">拖拽旋转 · 滚轮缩放</div>
  </div>
  <aside id="side">
    <div>
      <h1>材质实验室</h1>
      <p class="sub">程序化 PBR 贴图预览 · 全部由代码算出</p>
      <a href="/web/gallery.html" style="font-size:12px;color:var(--accent);text-decoration:none;">← 返回模型库</a>
    </div>
    <div class="group">
      <span class="glabel">预览模型</span>
      <div class="row" id="shape-row"></div>
    </div>
    <div class="group">
      <span class="glabel">材质分类</span>
      <div class="row" id="cat-row"></div>
      <select id="mat-select"></select>
    </div>
    <div class="group" id="param-group">
      <span class="glabel">参数</span>
      <div id="param-panel"></div>
    </div>
    <div class="foot" id="foot"></div>
  </aside>
</div>
<div id="loading" class="show" aria-live="polite" aria-hidden="false">
  <div class="loading-copy">
    <div id="loading-title" class="loading-title">生成程序化材质</div>
    <div id="loading-detail" class="loading-detail">正在计算 PBR 贴图</div>
    <div class="loading-track"><div class="loading-fill"></div></div>
  </div>
</div>
<script type="importmap">
{ "imports": {
  "three": "/web/vendor/three.module.js",
  "three/addons/": "/web/vendor/addons/",
  "meshova": "/dist/index.js",
  "meshova/pcg": "/dist/pcg/index.js"
} }
</script>
<script type="module" src="/web/matlab.js?v=stylecases1"></script>
</body>
</html>
