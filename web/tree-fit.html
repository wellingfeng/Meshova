<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meshova × SpeedTree 树木拟合对比</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
body{margin:0;background:#0d1117;color:#e6edf3;font:14px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif}
header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#0d1117,#0d1117ee);border-bottom:1px solid #28323d;padding:14px 22px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
header h1{margin:0;font-size:17px;font-weight:600}
header .sub{color:#8b949e;font-size:12px}
header .stat{margin-left:auto;display:flex;gap:14px}
header .stat b{color:#58a6ff}
.wrap{display:flex;gap:0;height:calc(100vh - 53px)}
.list{width:270px;flex:none;border-right:1px solid #28323d;overflow-y:auto;padding:8px}
.row{padding:9px 11px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:4px}
.row:hover{background:#161b22}
.row.on{background:#1f2937;border-color:#3b82f6}
.row .nm{font-weight:600}
.row .meta{color:#8b949e;font-size:12px;display:flex;justify-content:space-between;margin-top:2px}
.row .sc{font-variant-numeric:tabular-nums}
.sc.ok{color:#3fb950}.sc.warn{color:#d29922}.sc.bad{color:#f85149}
.stage{flex:1;display:flex;flex-direction:column;min-width:0}
.panes{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#28323d;min-height:0}
.pane{background:#0d1117;display:flex;flex-direction:column;min-width:0}
.pane h2{margin:0;font-size:12px;font-weight:600;color:#8b949e;padding:8px 12px;border-bottom:1px solid #21262d;text-transform:uppercase;letter-spacing:.4px}
.pane .body{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:#fff}
.pane.dark .body{background:#0d1117}
.pane img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.pane iframe{width:100%;height:100%;border:0;background:#0d1117}
.info{border-top:1px solid #28323d;padding:10px 16px;display:flex;gap:20px;flex-wrap:wrap;font-size:13px;background:#0f141b}
.info .k{color:#8b949e;margin-right:5px}
.info b{font-variant-numeric:tabular-nums}
.note{padding:6px 16px;color:#6e7681;font-size:11px;background:#0f141b;border-top:1px solid #21262d}
.info .spm{flex-basis:100%;margin-top:4px;padding:8px 10px;background:#0b1622;border:1px solid #1f3a52;border-radius:8px}
.info .spm-h{color:#58a6ff;font-size:11px;font-weight:600;margin-bottom:4px;letter-spacing:.3px}
.info .spm-n{color:#9fb1c1;font-size:12px;font-variant-numeric:tabular-nums;padding:1px 0}
</style>
</head>
<body>
<header>
  <h1>Meshova × SpeedTree 树木拟合对比</h1>
  <span class="sub" id="genAt"></span>
  <div class="stat">
    <span>均值 <b id="mean">–</b></span>
    <span>目标 <b id="target">–</b></span>
    <span>样本 <b id="count">–</b></span>
  </div>
</header>
<div class="wrap">
  <div class="list" id="list"></div>
  <div class="stage">
    <div class="panes">
      <div class="pane"><h2>SpeedTree 参考图</h2><div class="body"><img id="refImg" alt="reference"></div></div>
      <div class="pane dark"><h2>Meshova 最佳截图</h2><div class="body"><img id="bestImg" alt="best render"></div></div>
      <div class="pane dark"><h2>Meshova 可交互 3D</h2><div class="body"><iframe id="viewer" title="viewer"></iframe></div></div>
    </div>
    <div class="info" id="info"></div>
    <div class="note">流程：读取 SpeedTree .spm（gzip XML）→ 离线抽结构特征（分支数/长度比/叶量/角度）+ 参考图分区采样冠色/干色 → 映射为 Meshova 生成参数近真起点 → 多视角截图评分（剪影 IoU 0.72 + 颜色 0.28）→ 坐标下降精修。不逆向、不复刻、不内嵌 SPM 资产。3D 视图可拖拽旋转、滚轮缩放。</div>
  </div>
</div>
<script src="/web/tree-fit.js?v=cloth2" type="module"></script>
</body>
</html>
